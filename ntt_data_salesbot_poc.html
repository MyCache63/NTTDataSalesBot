            gap: 20px;
            flex-wrap: wrap;
            z-index: 9;
        }
        .control-group {
            display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888;
        }
        .control-group label { white-space: nowrap; user-select: none; cursor: pointer; }
        .toggle {
            position: relative; width: 36px; height: 20px; cursor: pointer;
        }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle .slider {
            position: absolute; inset: 0; background: #333; border-radius: 20px; transition: 0.3s;
        }
        .toggle .slider::before {
            content: ''; position: absolute; width: 16px; height: 16px;
            left: 2px; bottom: 2px; background: #888; border-radius: 50%; transition: 0.3s;
        }
        .toggle input:checked + .slider { background: #0050d4; }
        .toggle input:checked + .slider::before { transform: translateX(16px); background: white; }

        /* 3-mode selector */
        .mode-switch {
            display: flex; align-items: center; gap: 2px; font-size: 12px;
            background: #1a1f2e; border-radius: 8px; padding: 2px; border: 1px solid #2a3040;
        }
        .mode-btn {
            padding: 4px 14px; border-radius: 6px; border: none; cursor: pointer;
            font-size: 12px; font-weight: 500; background: transparent; color: #666;
            transition: all 0.2s;
        }
        .mode-btn.active { background: #0050d4; color: white; font-weight: 600; }
        .mode-btn:hover:not(.active) { color: #aaa; }

        /* ---- Layout: sidebar + main ---- */
        .app-body { display: flex; flex: 1; overflow: hidden; }

        /* ---- Sidebar ---- */
        .sidebar {

        .sidebar-new-btn:hover { background: #0070f3; }
        .sidebar-list {

        .sidebar-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        }
        .sidebar-item .conv-delete:hover { color: #ff6666; }
        .sidebar-toggle {

        .chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .message {

            to { opacity: 1; transform: translateY(0); }
        }
        .message.bot {

        }
        .message.user {

        .expand-item.open .expand-arrow { transform: rotate(90deg); }
        .expand-body {

let apiKey = localStorage.getItem('ntt_anthropic_key') || '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';
let responseMode = 'moderate'; // 'brief' | 'moderate' | 'verbose'
let showSources = false;
let showDiscover = true;

// ================================================================
// CONVERSATION STORAGE
// ================================================================
let conversations = JSON.parse(localStorage.getItem('ntt_conversations') || '[]');
let activeConvId = null;

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function getActiveConv() {
    return conversations.find(c => c.id === activeConvId);
}

function saveConversations() {
    localStorage.setItem('ntt_conversations', JSON.stringify(conversations));
}

function newConversation() {
    const conv = {
        id: genId(),
        title: 'New conversation',
        created: new Date().toISOString(),
        messages: [],        // {role, content} for API
        chatHtml: [],        // rendered HTML for display
    };
    conversations.unshift(conv);
    activeConvId = conv.id;
    saveConversations();
    renderSidebar();
    renderChat();
    showWelcome();
}

function switchConversation(id) {
    activeConvId = id;
    renderSidebar();
    renderChat();
}

function deleteConversation(id, e) {
    e.stopPropagation();
    conversations = conversations.filter(c => c.id !== id);
    if (activeConvId === id) {
        if (conversations.length > 0) {
            activeConvId = conversations[0].id;
        } else {
            newConversation();
            return;
        }
    }
    saveConversations();
    renderSidebar();
    renderChat();
}

function renderSidebar() {
    const list = document.getElementById('sidebarList');
    list.innerHTML = conversations.map(c => `
        <div class="sidebar-item ${c.id === activeConvId ? 'active' : ''}" onclick="switchConversation('${c.id}')">
            <button class="conv-delete" onclick="deleteConversation('${c.id}', event)" title="Delete">&times;</button>
            <div class="conv-title">${escHtml(c.title)}</div>
            <div class="conv-date">${new Date(c.created).toLocaleDateString()} ${new Date(c.created).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
        </div>
    `).join('');
}

function renderChat() {
    const container = document.getElementById('chatContainer');
    const conv = getActiveConv();
    if (!conv) { container.innerHTML = ''; return; }
    container.innerHTML = '';
    conv.chatHtml.forEach(html => {
        const div = document.createElement('div');
        div.innerHTML = html;
        const child = div.firstElementChild;
        if (child) container.appendChild(child);
    });
    container.scrollTop = container.scrollHeight;
    // Re-bind expand handlers
    container.querySelectorAll('.expand-header').forEach(el => {
        el.onclick = () => el.parentElement.classList.toggle('open');
    });
}

function getSystemPrompt() {
    const modeMap = {
        brief: `FORMAT: Maximum 3-5 lines total. Use one short sentence as the answer, then 3-5 bullet points with a bold keyword and a SHORT fragment (under 10 words each). No headers, no paragraphs, no intros. Example:
We have strong Azure capabilities through our Microsoft partnership.
- **Azure Expert MSP:** Highest Microsoft managed services credential
- **14,000+ Certifications:** Deep bench of Microsoft-skilled engineers
- **Landing Zones:** Deployed in ~10 days with security controls
- **FinOps:** Cloud spend optimization built in
- **Nucleus Platform:** Unified multi-cloud management dashboard
NEVER exceed 6 lines. NEVER write paragraphs. NEVER ask follow-up questions.`,

        moderate: `FORMAT: Lead with a 2-3 sentence summary. Then 4-6 key bullet points, each with a **Bold Title:** followed by one sentence of explanation. Keep total response under 15 lines. Use one ### header at most. Do NOT ask follow-up questions unless the user's question is genuinely ambiguous.`,

        verbose: `FORMAT: Provide detailed, comprehensive answers. Use markdown headers (###), bullet points, and bold (**) for structure. Be thorough — include metrics, specifics, and context. Do NOT ask follow-up questions unless the user's question is genuinely ambiguous.`
    };

    return `You are the NTT DATA Cloud Services Sales Assistant — an expert on NTT DATA's complete cloud services portfolio. You work for NTT DATA and speak as "we" when referring to the company.

Your role: help NTT DATA sales reps understand products, position solutions, prep for meetings, and answer questions about capabilities.

${modeMap[responseMode]}

KNOWLEDGE BASE:
${KNOWLEDGE_BASE}

GUIDELINES:
- Speak as an NTT DATA insider ("we offer", "our platform")
- Be specific — cite product names, metrics, capabilities from the knowledge base
- When info is not in the knowledge base, say so honestly
- For meeting prep, provide structured talking points
- Focus on NTT DATA strengths, not competitor attacks
- Be conversational but substantive
- IMPORTANT: Do NOT end responses with questions like "Would you like to know more?" or "Shall I dive deeper?" — just answer what was asked`;
}

// ================================================================
// API
// ================================================================
async function callClaude(userMessage) {
    const conv = getActiveConv();
    conv.messages.push({ role: 'user', content: userMessage });

    const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: { brief: 300, moderate: 700, verbose: 1200 }[responseMode],
            system: getSystemPrompt(),
            messages: conv.messages.slice(-20)
        })
    });

    if (!response.ok) {
        const err = await response.text();
        throw new Error(`API error (${response.status}): ${err}`);
    }

    const data = await response.json();
    const text = data.content[0].text;
    conv.messages.push({ role: 'assistant', content: text });

    // Update title from first user message
    if (conv.messages.filter(m => m.role === 'user').length === 1) {
        conv.title = userMessage.length > 50 ? userMessage.slice(0, 47) + '...' : userMessage;
    }

    saveConversations();
    renderSidebar();
    return text;
}

// ================================================================
// MARKDOWN TO HTML
// ================================================================
function markdownToHtml(text) {
    let html = text
        .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^## (.+)$/gm, '<h3>$1</h3>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^- (.+)$/gm, '<<LI>>$1<</LI>>')
        .replace(/^\d+\. (.+)$/gm, '<<LI>>$1<</LI>>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>');

    // Wrap consecutive list items
    html = html.replace(/(<<LI>>.*?<<\/LI>>(?:<br>)?)+/g, (match) => {
        const items = match.replace(/<br>/g, '').replace(/<<LI>>/g, '<li>').replace(/<<\/LI>>/g, '</li>');
        return '<ul>' + items + '</ul>';
    });

    return '<p>' + html + '</p>';
}

function briefToExpandable(text) {
    // For brief mode: parse key points into expandable items
    const html = markdownToHtml(text);

    // Find list items and make them expandable
    const container = document.createElement('div');
    container.innerHTML = html;

    const listItems = container.querySelectorAll('li');
    if (listItems.length > 2) {
        listItems.forEach(li => {
            const content = li.innerHTML;
            // Check if it has a bold prefix (the "title" part)
            const boldMatch = content.match(/^<strong>(.+?)<\/strong>:?\s*(.*)/s);
            if (boldMatch) {
                const title = boldMatch[1];
                const detail = boldMatch[2] || '';
                const item = document.createElement('div');
                item.className = 'expand-item';
                item.innerHTML = `
                    <div class="expand-header" onclick="this.parentElement.classList.toggle('open')">
                        <span class="expand-arrow">&#9654;</span>
                        <strong style="color:#a0c4ff">${title}</strong>
                    </div>
                    <div class="expand-body">${detail || 'Click to expand for more details.'}</div>
                `;
                li.replaceWith(item);
            }
        });
    }
    return container.innerHTML;
}

function addSourcesHtml() {
    if (!showSources) return '';
    return `<div class="sources-block">
        <div class="src-label">Sources:</div>
        ${SOURCES.map(s => `<div class="src-item"><a href="${s.url}" target="_blank">${s.label}</a></div>`).join('')}
    </div>`;
}

// ================================================================
// UI
// ================================================================
const chatContainer = document.getElementById('chatContainer');
const typingIndicator = document.getElementById('typingIndicator');

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showWelcome() {
    addBotMessageToChat(`<div class="sender">NTT DATA Assistant</div>
<h4>Welcome to the NTT DATA Cloud Services Assistant</h4>
<p>I'm your AI-powered guide to NTT DATA's cloud portfolio. Ask me anything in plain English!</p>
<p style="color:#666;font-size:12px;margin-top:6px;">POC Demo — Powered by Claude AI</p>`);
}

function addBotMessageToChat(html) {
    const conv = getActiveConv();
    const wrapper = `<div class="message bot">${html}</div>`;
    conv.chatHtml.push(wrapper);
    saveConversations();

    const msg = document.createElement('div');
    msg.className = 'message bot';
    msg.innerHTML = html;
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;

    // Bind expand handlers
    msg.querySelectorAll('.expand-header').forEach(el => {
        el.onclick = () => el.parentElement.classList.toggle('open');
    });
}

function addUserMessageToChat(text) {
    const conv = getActiveConv();
    const wrapper = `<div class="message user">${escHtml(text)}</div>`;
    conv.chatHtml.push(wrapper);
    saveConversations();

    const msg = document.createElement('div');
    msg.className = 'message user';
    msg.textContent = text;
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

function addErrorToChat(text) {
    const msg = document.createElement('div');
    msg.className = 'message error';
    msg.innerHTML = `<strong>Error:</strong> ${text}`;
    chatContainer.appendChild(msg);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

function showTyping() {
    typingIndicator.style.display = 'block';
    chatContainer.appendChild(typingIndicator);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}
function hideTyping() { typingIndicator.style.display = 'none'; }

// ---- Controls ----
function setMode(mode) {
    responseMode = mode;
    document.getElementById('modeBrief').classList.toggle('active', mode === 'brief');
    document.getElementById('modeModerate').classList.toggle('active', mode === 'moderate');
    document.getElementById('modeVerbose').classList.toggle('active', mode === 'verbose');
}

function updateDiscover() {
    showDiscover = document.getElementById('toggleDiscover').checked;
    document.getElementById('quickActions').classList.toggle('hidden', !showDiscover);
}

function updateSources() {
    showSources = document.getElementById('toggleSources').checked;
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
}

function saveApiKey() {
    const input = document.getElementById('apiKeyInput');
    apiKey = input.value.trim();
    if (apiKey) {
        localStorage.setItem('ntt_anthropic_key', apiKey);
        document.getElementById('apiBanner').classList.add('hidden');
    }
}

// ---- Send ----
async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    if (!apiKey) {
        document.getElementById('apiBanner').classList.remove('hidden');
        addErrorToChat('Please enter your Anthropic API key above.');
        return;
    }

    addUserMessageToChat(text);
    input.value = '';
    document.getElementById('sendBtn').disabled = true;
    showTyping();

    try {
        const response = await callClaude(text);
        hideTyping();

        let rendered;
        if (responseMode === 'brief') {
            rendered = briefToExpandable(response);
        } else {
            rendered = markdownToHtml(response);
        }

        rendered += addSourcesHtml();
        addBotMessageToChat(`<div class="sender">NTT DATA Assistant</div>${rendered}`);
    } catch (err) {
        hideTyping();
        console.error('API error:', err);
        if (err.message.includes('401')) {
            addErrorToChat('Invalid API key. Check your Anthropic API key.');
            document.getElementById('apiBanner').classList.remove('hidden');
        } else {
            addErrorToChat(err.message);
        }
    }

    document.getElementById('sendBtn').disabled = false;
    input.focus();
}

function sendQuick(text) {
    document.getElementById('userInput').value = text;
    sendMessage();
}

// ---- Init ----
window.addEventListener('load', () => {
    if (apiKey) document.getElementById('apiBanner').classList.add('hidden');
    setMode('moderate');

    if (conversations.length === 0) {
        newConversation();
    } else {
        activeConvId = conversations[0].id;
        renderSidebar();
        renderChat();
        // If the active conv is empty, show welcome
        if (getActiveConv().chatHtml.length === 0) showWelcome();
    }
});
</script>
